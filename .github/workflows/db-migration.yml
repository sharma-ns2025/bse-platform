name: DB Migration

on:
  workflow_dispatch:

env:
  S3_BUCKET: bse-data-bucket
  DB_SECRET_ID: rds!db-31f5b772-0149-41eb-9b75-96cd1617c06e
  DB_HOST: bse-postgres.c1i6eqmie4pa.region.rds.amazonaws.com
  INSTANCE_ID: i-0a9fca1bc3032e6db
  AWS_REGION: us-east-1

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload migrations to S3
        run: |
          aws s3 sync database/migrations/ s3://${S3_BUCKET}/migrations/ --delete

      - name: Create SSM command payload
        run: |
          cat > commands.json <<EOF
          {
            "commands": [
              "set -e",
              "echo 'Starting migration...'",

              "mkdir -p /tmp/migrations",
              "aws s3 cp s3://${S3_BUCKET}/migrations/ /tmp/migrations/ --recursive",

              "SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id ${DB_SECRET_ID} --query SecretString --output text)",

              "DB_PASSWORD=$(echo $SECRET_JSON | jq -r .password)",

              "export PGPASSWORD=$DB_PASSWORD",

              "for file in $(find /tmp/migrations -name '*.sql' | sort); do
                echo Running $file;
                psql -h ${DB_HOST} -U postgres -d postgres -f $file;
              done"
            ]
          }
          EOF

      - name: Run migrations on EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters file://commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for SSM command result
        run: |
          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID