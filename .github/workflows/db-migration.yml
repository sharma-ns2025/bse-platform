name: Database Migration

on:
  push:
    paths:
      - 'database/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Trigger Flyway migration on bastion via SSM
        run: |
          aws ssm send-command \
            --instance-ids "i-0a9fca1bc3032e6db" \
            --document-name "AWS-RunShellScript" \
            --comment "Run Flyway migrations" \
            --parameters '{
              "commands":[
                "export DB_PASS=$(aws secretsmanager get-secret-value --secret-id rds!db-31f5b772-0149-41eb-9b75-96cd1617c06e --query SecretString --output text)",
                "cd /opt/flyway",
                "flyway -url=jdbc:postgresql://bse-postgres.c1i6eqmie4pa.eu-central-1.rds.amazonaws.com:5432/postgres -user=postgres -password=$DB_PASS -locations=filesystem:/opt/flyway/sql migrate"
              ]
            }' \
            --region "eu-central-1"