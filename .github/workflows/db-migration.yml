name: Database Migration

on:
  push:
    paths:
      - 'database/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Copy migration files to bastion via SSM (pull from repo)
        run: |
          aws ssm send-command \
            --instance-ids "i-0a9fca1bc3032e6db" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands":[
                "rm -rf /tmp/migrations",
                "mkdir -p /tmp/migrations",
                "cd /tmp/migrations",
                "git clone https://github.com/${{ github.repository }}.git repo",
                "cp -r repo/database/migrations/* /tmp/migrations/"
              ]
            }' \
            --region "eu-central-1"

      - name: Run SQL migrations on RDS via SSM
        run: |
          aws ssm send-command \
            --instance-ids "i-0a9fca1bc3032e6db" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands":[
                "for file in $(ls /tmp/migrations/*.sql | sort); do",
                "  echo Running $file",
                "  psql -h bse-postgres.c1i6eqmie4pa.eu-central-1.rds.amazonaws.com:5432 -U postgres -d postgres -f $file",
                "done"
              ]
            }' \
            --region "eu-central-1"