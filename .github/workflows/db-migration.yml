name: Database Migration

on:
  push:
    paths:
      - 'database/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    env:
      S3_BUCKET: bse-data-bucket
      DB_SECRET_ID: rds!db-31f5b772-0149-41eb-9b75-96cd1617c06e
      DB_HOST: bse-postgres.c1i6eqmie4pa.eu-central-1.rds.amazonaws.com
      INSTANCE_ID: i-0a9fca1bc3032e6db

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -------------------------------
      # Upload migrations to S3
      # -------------------------------
      - name: Sync migrations to S3 (incremental)
        run: |
          set -e

          LOCAL_DIR="database/migrations"
          S3_PATH="s3://$S3_BUCKET/migrations"

          # Generate SHA256 hashes of local files
          find "$LOCAL_DIR" -type f -exec sha256sum {} \; > /tmp/local_hashes.txt

          # Download previous hash list from S3 (if exists)
          aws s3 cp "$S3_PATH/.hashes.txt" /tmp/s3_hashes.txt || touch /tmp/s3_hashes.txt

          # Compare hashes to detect changed/new files
          while read -r hash file; do
            s3_file="${file#$LOCAL_DIR/}"  # remove local folder prefix
            old_hash=$(grep " $s3_file\$" /tmp/s3_hashes.txt | awk '{print $1}')
            if [ "$hash" != "$old_hash" ]; then
              echo "Uploading changed/new file: $s3_file"
              aws s3 cp "$file" "$S3_PATH/$s3_file"
            fi
          done < /tmp/local_hashes.txt

          # Update hash file in S3
          cp /tmp/local_hashes.txt /tmp/local_hashes.txt.s3ready
          sed -i "s|$LOCAL_DIR/||g" /tmp/local_hashes.txt.s3ready
          aws s3 cp /tmp/local_hashes.txt.s3ready "$S3_PATH/.hashes.txt"
          
      #- name: Sync migrations to S3
      #  run: |
      #    set -e
      #    aws s3 sync database/migrations/ s3://$S3_BUCKET/migrations/ \
      #      --exact-timestamps \
      #      --delete \
      #      --size-only
      
      # If you don’t want to touch S3 for deleted files, remove --delete:
      
      # -------------------------------
      # Build SSM command script safely
      # -------------------------------
      - name: Create SSM commands file
        run: |
          cat > commands.json <<'EOF'
          {
            "commands": [
              "set -e",
              "S3_BUCKET='bse-data-bucket'",
              "DB_SECRET_ID='rds!db-31f5b772-0149-41eb-9b75-96cd1617c06e'",
              "DB_HOST='bse-postgres.c1i6eqmie4pa.eu-central-1.rds.amazonaws.com'",
              "echo Starting migration...",
              "mkdir -p /tmp/migrations",
              "aws s3 cp s3://$S3_BUCKET/migrations/ /tmp/migrations/ --recursive",
              "SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $DB_SECRET_ID --query SecretString --output text)",
              "DB_PASSWORD=$(echo \"$SECRET_JSON\" | jq -r '.password')",
              "export PGPASSWORD=$DB_PASSWORD",
              "for file in /tmp/migrations/*.sql; do echo Running $file; psql -h $DB_HOST -U postgres -d postgres -f \"$file\"; done"
            ]
          }
          EOF

      # -------------------------------
      # Send SSM command
      # -------------------------------
      - name: Execute migrations via SSM
        run: |
          set -e

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      # -------------------------------
      # Wait + fetch logs (IMPORTANT FIX)
      # -------------------------------
      - name: Wait for SSM command & show logs
        run: |
          set +e

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          echo "---- SSM OUTPUT ----"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --output json
          
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          echo "SSM Status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command failed"
            exit 1
          fi