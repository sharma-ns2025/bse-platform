name: DB Migration Pipeline

on:
  workflow_dispatch:

env:
  S3_BUCKET: bse-data-bucket
  DB_SECRET_ID: rds!db-31f5b772-0149-41eb-9b75-96cd1617c06e
  DB_HOST: bse-postgres.c1i6eqmie4pa.region.rds.amazonaws.com
  INSTANCE_ID: i-0a9fca1bc3032e6db
  AWS_REGION: us-east-1

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload migrations to S3
        run: |
          aws s3 sync database/migrations/ s3://${S3_BUCKET}/migrations/ --delete

      - name: Run migrations via SSM
        run: |
          cat > commands.json <<EOF
          {
            "commands": [
              "set -e",
              "echo Starting migration",

              "mkdir -p /tmp/migrations",

              "aws s3 cp s3://${S3_BUCKET}/migrations/ /tmp/migrations/ --recursive",

              "SECRET=$(aws secretsmanager get-secret-value --secret-id ${DB_SECRET_ID} --query SecretString --output text)",

              "DB_PASSWORD=$(echo $SECRET | python3 -c \"import sys, json; print(json.load(sys.stdin)['password'])\")",

              "export PGPASSWORD=$DB_PASSWORD",

              "for file in $(find /tmp/migrations -name '*.sql' | sort); do \
                  echo Running $file; \
                  psql -h ${DB_HOST} -U postgres -d postgres -f $file; \
               done"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters file://commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for SSM execution
        run: |
          for i in {1..10}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text)

            echo "Attempt $i - Status: $STATUS"

            if [[ "$STATUS" == "Success" ]]; then
              echo "Migration successful"
              exit 0
            fi

            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" ]]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${INSTANCE_ID}" \
                --output json
              exit 1
            fi

            sleep 1
          done

          echo "Timeout waiting for SSM"
          exit 1