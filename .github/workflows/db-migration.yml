name: Database Migration

on:
  push:
    paths:
      - 'database/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    env:
      S3_BUCKET: bse-data-bucket
      DB_SECRET_ID: rds!db-31f5b772-0149-41eb-9b75-96cd1617c06e
      DB_HOST: bse-postgres.c1i6eqmie4pa.eu-central-1.rds.amazonaws.com
      INSTANCE_ID: i-0a9fca1bc3032e6db
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Upload migration files to S3
      - name: Upload migration files to S3
        run: |
          aws s3 sync database/migrations/ s3://${S3_BUCKET}/migrations/ --delete

      # Build command script (safe + no jq + no EC2 dependencies)
      - name: Run migrations via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Database migration pipeline" \
            --parameters "commands=[
              \"set -e\",
              \"echo 'Starting migration'\",
              
              \"rm -rf /tmp/migrations\",
              \"mkdir -p /tmp/migrations\",
              
              \"aws s3 cp s3://${S3_BUCKET}/migrations/ /tmp/migrations/ --recursive\",
              
              \"SECRET=$(aws secretsmanager get-secret-value --secret-id ${DB_SECRET_ID} --query SecretString --output text)\",
              
              \"DB_PASSWORD=$(python3 -c \\\"import json,sys; print(json.loads(sys.argv[1]).get('password',''))\\\" \\\"$SECRET\\\")\",
              
              \"export PGPASSWORD=$DB_PASSWORD\",
              
              \"for file in $(find /tmp/migrations -name '*.sql' | sort); do
                  echo 'Running' $file;
                  psql -h ${DB_HOST} -U postgres -d postgres -f $file;
              done\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Wait for completion
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${INSTANCE_ID}"

          # Fetch result
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${INSTANCE_ID}" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}'